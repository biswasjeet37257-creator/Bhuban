<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Bhuban</title>
    <link rel="icon" type="image/png" href="this-is-a-video-sharing-app-like-a-youtube-and-the-1770747539971.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/shared/config.js"></script>
    <script src="/shared/auth-service.js"></script>
    <script src="auth-check.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1e, #0a0a0e);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header i {
            cursor: pointer;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3b30, #ff6b30);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            color: #888;
        }

        .value {
            font-weight: 600;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff3b30, #ff6b30);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff3b30, #ff1744);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #00d4ff;
        }

        .badge.creator {
            background: rgba(255, 215, 0, 0.2);
            border-color: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }
    </style>
</head>

<body>
    <div class="header">
        <i data-lucide="arrow-left" onclick="window.location.href='index.html'"></i>
        <h2 style="font-size:20px; font-weight:900;">My Account</h2>
    </div>

    <div class="container">
        <div class="card">
            <div class="profile-header">
                <div class="avatar" id="avatar">U</div>
                <div>
                    <h1 id="user-name">Loading...</h1>
                    <p style="color: #888;" id="user-email">Loading...</p>
                </div>
            </div>

            <div class="info-row">
                <span class="label">Account Type</span>
                <span class="value" id="user-role">
                    <span class="badge" id="role-badge">User</span>
                </span>
            </div>

            <div class="info-row" id="provider-row" style="display: none;">
                <span class="label">Sign In Method</span>
                <span class="value" id="provider-info">
                    <span class="badge" id="provider-badge">Local</span>
                </span>
            </div>

            <div class="info-row">
                <span class="label">Member Since</span>
                <span class="value" id="member-since">Loading...</span>
            </div>

            <div class="info-row">
                <span class="label">Account Status</span>
                <span class="value">
                    <span class="badge">Active</span>
                </span>
            </div>
        </div>

        <div class="card">
            <h2>Account Actions</h2>
            <div class="actions">
                <button class="btn btn-secondary" onclick="window.location.href='profile.html'">
                    <i data-lucide="user" style="width:16px; height:16px;"></i>
                    Edit Profile
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='settings.html'">
                    <i data-lucide="settings" style="width:16px; height:16px;"></i>
                    Settings
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='../Bhuban%20creator%20app/index.html'">
                    <i data-lucide="video" style="width:16px; height:16px;"></i>
                    Creator Studio
                </button>
            </div>
        </div>

        <div class="card">
            <h2>Security</h2>
            <div class="actions">
                <button class="btn btn-secondary">
                    <i data-lucide="key" style="width:16px; height:16px;"></i>
                    Change Password
                </button>
                <button class="btn btn-danger" onclick="logout()">
                    <i data-lucide="log-out" style="width:16px; height:16px;"></i>
                    Logout
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Enforce authentication
        AuthService.requireAuth();

        // Load user data
        function loadUserData() {
            const user = AuthService.getUser();
            if (!user) return;

            // Update UI
            document.getElementById('user-name').textContent = user.name || 'User';
            document.getElementById('user-email').textContent = user.email || 'No email';

            // Avatar - check multiple possible fields for profile photo
            const avatarEl = document.getElementById('avatar');
            const photoUrl = user.avatar || user.picture;

            if (photoUrl) {
                avatarEl.innerHTML = `<img src="${photoUrl}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;" onerror="this.parentElement.textContent='${user.name.charAt(0).toUpperCase()}';">`;
            } else {
                avatarEl.textContent = user.name.charAt(0).toUpperCase();
            }

            // Role badge
            const roleBadge = document.getElementById('role-badge');
            if (user.role === 'publisher' || user.role === 'creator') {
                roleBadge.textContent = 'Creator';
                roleBadge.classList.add('creator');
            } else {
                roleBadge.textContent = 'Viewer';
            }

            // Provider info
            if (user.provider && user.provider !=== 'local') {
                const providerRow = document.getElementById('provider-row');
                const providerBadge = document.getElementById('provider-badge');
                if (providerRow) providerRow.style.display = 'flex';

                if (providerBadge) {
                    if (user.provider === 'google') {
                        providerBadge.textContent = '🔐 Google Account';
                        providerBadge.style.background = 'rgba(66, 133, 244, 0.2)';
                        providerBadge.style.borderColor = 'rgba(66, 133, 244, 0.3)';
                        providerBadge.style.color = '#4285f4';
                    } else if (user.provider === 'apple') {
                        providerBadge.textContent = '🍎 Apple Account';
                        providerBadge.style.background = 'rgba(255, 255, 255, 0.2)';
                        providerBadge.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                        providerBadge.style.color = '#fff';
                    }
                }
            }

            // Member since
            if (user.createdAt) {
                const memberSince = new Date(user.createdAt).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('member-since').textContent = memberSince;
            } else {
                document.getElementById('member-since').textContent = 'Long time member';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                AuthService.logout();
            }
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>

</html>
