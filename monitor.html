<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhuban System Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #FFB74D, #F06292, #E91E63);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #F06292, #E91E63);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.3);
        }

        button.secondary {
            background: #333;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .card h2 {
            color: #FFB74D;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-value {
            font-weight: 700;
            font-size: 24px;
        }

        .stat-value.healthy {
            color: #4caf50;
        }

        .stat-value.unhealthy {
            color: #f44336;
        }

        .log-container {
            background: #000;
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }

        .log-entry.error {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
        }

        .log-entry.success {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
        }

        .log-entry.info {
            color: #aaa;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s;
        }

        .pathway-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
        }

        .pathway-item.error {
            border-left-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ Bhuban System Monitor</h1>

        <div class="controls">
            <button id="startBtn" onclick="startMonitoring()">▶️ Start Monitoring</button>
            <button onclick="checkAll()" class="secondary">🔍 Check All</button>
            <button onclick="clearLogs()" class="secondary">🗑️ Clear Logs</button>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2>System Health</h2>
                <div class="stat">
                    <span>Backend</span>
                    <span class="stat-value" id="backendStatus">⚪</span>
                </div>
                <div class="stat">
                    <span>Database</span>
                    <span class="stat-value" id="dbStatus">⚪</span>
                </div>
                <div class="stat">
                    <span>Videos</span>
                    <span class="stat-value" id="videosStatus">⚪</span>
                </div>
                <div class="stat">
                    <span>Auth</span>
                    <span class="stat-value" id="authStatus">⚪</span>
                </div>
            </div>

            <div class="card">
                <h2>Performance</h2>
                <div class="stat">
                    <span>Response Time</span>
                    <span class="stat-value" id="responseTime">0ms</span>
                </div>
                <div class="stat">
                    <span>Total Checks</span>
                    <span class="stat-value" id="totalChecks">0</span>
                </div>
                <div class="stat">
                    <span>Success Rate</span>
                    <span class="stat-value healthy" id="successRate">0%</span>
                </div>
            </div>

            <div class="card">
                <h2>Quick Stats</h2>
                <div class="stat">
                    <span>Videos in DB</span>
                    <span class="stat-value" id="videoCount">0</span>
                </div>
                <div class="stat">
                    <span>Logged In</span>
                    <span class="stat-value" id="loginStatus">No</span>
                </div>
                <div class="stat">
                    <span>Profile Photo</span>
                    <span class="stat-value" id="photoStatus">No</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>System Logs</h2>
            <div class="log-container" id="logContainer">
                <div class="log-entry info">Monitor initialized. Click "Start Monitoring" to begin.</div>
            </div>
        </div>
    </div>

    <script>
        let monitoring = false;
        let monitorInterval;
        let checks = { total: 0, success: 0, failed: 0 };
        let responseTimes = [];

        function addLog(type, message) {
            const container = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            container.insertBefore(entry, container.firstChild);

            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        async function checkBackend() {
            const start = Date.now();
            try {
                const response = await fetch('http://localhost:5000/api/videos');
                const time = Date.now() - start;
                responseTimes.push(time);
                if (responseTimes.length > 10) responseTimes.shift();

                if (response.ok) {
                    document.getElementById('backendStatus').textContent = '✅';
                    document.getElementById('backendStatus').className = 'stat-value healthy';
                    checks.success++;
                    return { success: true, time };
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                document.getElementById('backendStatus').textContent = '❌';
                document.getElementById('backendStatus').className = 'stat-value unhealthy';
                checks.failed++;
                addLog('error', `Backend check failed: ${error.message}`);
                return { success: false, time: Date.now() - start };
            }
        }

        async function checkVideos() {
            try {
                const response = await fetch('http://localhost:5000/api/videos');
                const data = await response.json();
                
                if (data.success && data.data) {
                    const count = data.count || data.data.length;
                    document.getElementById('videosStatus').textContent = '✅';
                    document.getElementById('videosStatus').className = 'stat-value healthy';
                    document.getElementById('videoCount').textContent = count;
                    checks.success++;
                    addLog('success', `Found ${count} videos in database`);
                } else {
                    throw new Error('Invalid response');
                }
            } catch (error) {
                document.getElementById('videosStatus').textContent = '❌';
                document.getElementById('videosStatus').className = 'stat-value unhealthy';
                checks.failed++;
                addLog('error', `Video check failed: ${error.message}`);
            }
        }

        async function checkAuth() {
            const token = localStorage.getItem('token');
            
            if (token) {
                try {
                    const response = await fetch('http://localhost:5000/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        document.getElementById('authStatus').textContent = '✅';
                        document.getElementById('authStatus').className = 'stat-value healthy';
                        document.getElementById('loginStatus').textContent = 'Yes';
                        checks.success++;
                        
                        if (data.data && data.data.avatar) {
                            document.getElementById('photoStatus').textContent = 'Yes';
                            addLog('success', 'User authenticated with profile photo');
                        } else {
                            addLog('success', 'User authenticated');
                        }
                    } else {
                        throw new Error('Auth failed');
                    }
                } catch (error) {
                    document.getElementById('authStatus').textContent = '⚠️';
                    document.getElementById('loginStatus').textContent = 'No';
                    checks.failed++;
                }
            } else {
                document.getElementById('authStatus').textContent = '⚪';
                document.getElementById('loginStatus').textContent = 'No';
                addLog('info', 'No user logged in');
            }
        }

        function checkLocalStorage() {
            const profilePhoto = localStorage.getItem('profilePhoto');
            const displayName = localStorage.getItem('displayName');
            
            if (profilePhoto) {
                document.getElementById('photoStatus').textContent = 'Yes';
                addLog('info', `Profile: ${displayName || 'Unknown'}`);
            } else {
                document.getElementById('photoStatus').textContent = 'No';
            }
        }

        async function checkAll() {
            addLog('info', '🔍 Running system checks...');
            checks.total++;
            
            const backendResult = await checkBackend();
            
            if (backendResult.success) {
                document.getElementById('dbStatus').textContent = '✅';
                document.getElementById('dbStatus').className = 'stat-value healthy';
                
                await checkVideos();
                await checkAuth();
                checkLocalStorage();
                
                // Update stats
                const avgTime = responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length;
                document.getElementById('responseTime').textContent = Math.round(avgTime) + 'ms';
                document.getElementById('totalChecks').textContent = checks.total;
                
                const successRate = ((checks.success / (checks.success + checks.failed)) * 100).toFixed(1);
                document.getElementById('successRate').textContent = successRate + '%';
                
                addLog('success', '✅ All checks completed');
            } else {
                document.getElementById('dbStatus').textContent = '❌';
                document.getElementById('dbStatus').className = 'stat-value unhealthy';
                addLog('error', '❌ Backend not responding - other checks skipped');
            }
        }

        function startMonitoring() {
            if (monitoring) {
                stopMonitoring();
                return;
            }

            monitoring = true;
            document.getElementById('startBtn').textContent = '⏸️ Stop Monitoring';
            addLog('success', '🛡️ Monitoring activated');
            
            checkAll();
            monitorInterval = setInterval(checkAll, 10000); // Check every 10 seconds
        }

        function stopMonitoring() {
            monitoring = false;
            clearInterval(monitorInterval);
            document.getElementById('startBtn').textContent = '▶️ Start Monitoring';
            addLog('info', '⏸️ Monitoring paused');
        }

        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '<div class="log-entry info">Logs cleared</div>';
        }

        // Initial check on load
        window.addEventListener('load', () => {
            addLog('info', 'System monitor ready');
            setTimeout(checkAll, 1000);
        });
    </script>
</body>
</html>
