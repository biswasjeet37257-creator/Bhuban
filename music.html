<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Bhuban</title>
    <link rel="icon" type="image/png" href="this-is-a-video-sharing-app-like-a-youtube-and-the-1770747539971.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/shared/config.js"></script>
    <script src="/shared/auth-service.js"></script>
    <script src="api-service.js"></script>
    <script src="auth-check.js"></script>

    <!-- Socket.io for real-time notifications -->
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>

    <!-- New component styles -->
    <link rel="stylesheet" href="components.css">

    <style>
        :root {
            --accent: #ff6b35;
            --accent-pink: #ff006e;
            --accent-yellow: #ffd60a;
            --accent-gradient: linear-gradient(135deg, #ff6b35 0%, #ff006e 50%, #ffd60a 100%);
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --text-primary: #fff8f0;
            --text-secondary: #d4a574;
            --border-color: rgba(255, 107, 107, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .music-header {
            padding: 15px 20px;
            background: #0a0a0e;
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-controls {
            display: flex;
            gap: 15px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn.active {
            background: var(--accent-gradient);
            border-color: var(--accent);
        }

        .filter-btn:hover {
            background: #2a2a3e;
        }

        .music-container {
            padding: 0 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .featured-section {
            background: linear-gradient(135deg, #ff6b35, #ff006e);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .featured-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="3" fill="rgba(255,255,255,0.1)"/><circle cx="40" cy="80" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            opacity: 0.3;
        }

        .featured-content {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .featured-artwork {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .featured-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .featured-info {
            flex: 1;
        }

        .featured-title {
            font-size: 24px;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
        }

        .featured-artist {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        .featured-stats {
            display: flex;
            gap: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .featured-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .play-btn-large {
            background: white;
            color: #ff006e;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .play-btn-large:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.3);
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .music-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
        }

        .music-card.playing {
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        .album-art {
            position: relative;
            height: 180px;
            background: linear-gradient(45deg, #ff6b35, #ff006e);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .music-card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .play-icon:hover {
            transform: scale(1.1);
        }

        .music-info {
            padding: 15px;
        }

        .song-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            box-orient: vertical;
            overflow: hidden;
        }

        .artist-name {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .song-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .music-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .play-btn {
            background: var(--accent);
            color: white;
        }

        .play-btn:hover {
            background: #ff521a;
        }

        .add-btn {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .add-btn:hover {
            background: #2a2a3e;
        }

        .genres-section {
            margin: 40px 0;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .genres-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .genre-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .genre-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .genre-card.active {
            background: var(--accent-gradient);
            border-color: var(--accent);
        }

        .genre-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .genre-name {
            font-weight: 600;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .music-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .featured-content {
                flex-direction: column;
                text-align: center;
            }

            .music-controls {
                flex-direction: column;
            }
        }

        /* Enhanced touch feedback */
        .music-card:active,
        .genre-card:active {
            transform: scale(0.98);
        }

        /* Improved accessibility */
        .action-btn:focus,
        .filter-btn:focus,
        .genre-card:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Loading animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Video player overlay */
        .video-player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-content {
            width: 90%;
            max-width: 800px;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="music-header">
        <i data-lucide="arrow-left" onclick="window.history.back()" style="cursor: pointer;"></i>
        <div class="page-title">
            <i data-lucide="music"></i>
            Music
        </div>
        <div style="flex: 1;"></div>
        <i data-lucide="search" style="cursor: pointer;"></i>
    </div>

    <div class="music-controls">
        <button class="filter-btn active" onclick="filterMusic('all')">
            <i data-lucide="music"></i> All Music
        </button>
        <button class="filter-btn" onclick="filterMusic('pop')">
            <i data-lucide="sparkles"></i> Pop
        </button>
        <button class="filter-btn" onclick="filterMusic('rock')">
            <i data-lucide="guitar"></i> Rock
        </button>
        <button class="filter-btn" onclick="filterMusic('hiphop')">
            <i data-lucide="mic"></i> Hip Hop
        </button>
        <button class="filter-btn" onclick="filterMusic('electronic')">
            <i data-lucide="zap"></i> Electronic
        </button>
    </div>

    <div class="music-container">
        <!-- Featured Music Section -->
        <div class="featured-section">
            <div class="featured-content">
                <div class="featured-artwork">
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200" alt="Featured Album">
                </div>
                <div class="featured-info">
                    <div class="featured-title">Midnight Dreams</div>
                    <div class="featured-artist">By Starlight Collective</div>
                    <div class="featured-stats">
                        <span>15M plays</span>
                        <span>420K likes</span>
                        <span>2.1M followers</span>
                    </div>
                    <div class="featured-actions">
                        <button class="play-btn-large" onclick="playFeatured()">
                            <i data-lucide="play"></i> Play Now
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Genres Section -->
        <div class="genres-section">
            <div class="section-title">Browse by Genre</div>
            <div class="genres-grid">
                <div class="genre-card active" onclick="selectGenre('pop')">
                    <div class="genre-icon">🎵</div>
                    <div class="genre-name">Pop</div>
                </div>
                <div class="genre-card" onclick="selectGenre('rock')">
                    <div class="genre-icon">🎸</div>
                    <div class="genre-name">Rock</div>
                </div>
                <div class="genre-card" onclick="selectGenre('hiphop')">
                    <div class="genre-icon">🎤</div>
                    <div class="genre-name">Hip Hop</div>
                </div>
                <div class="genre-card" onclick="selectGenre('electronic')">
                    <div class="genre-icon">⚡</div>
                    <div class="genre-name">Electronic</div>
                </div>
                <div class="genre-card" onclick="selectGenre('jazz')">
                    <div class="genre-icon">🎹</div>
                    <div class="genre-name">Jazz</div>
                </div>
                <div class="genre-card" onclick="selectGenre('classical')">
                    <div class="genre-icon">🎻</div>
                    <div class="genre-name">Classical</div>
                </div>
            </div>
        </div>

        <!-- Music Grid -->
        <div class="section-title">Popular Tracks</div>
        <div class="music-grid" id="music-container">
            <!-- Music tracks will be loaded here -->
        </div>
    </div>

    <script>
        // No fake music data - only real music videos from backend
        let musicVideos = [];
        let currentFilter = 'all';

        async function loadMusic() {
            const container = document.getElementById('music-container');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div></div>';

            try {
                let url = '/videos?category=Music&limit=20';

                // If filter is active, we could try to search within Music
                // but for now let's just use the category

                const res = await api.request(url);
                if (res.success) {
                    musicVideos = res.data;
                    renderMusic();
                }
            } catch (error) {
                console.error('Failed to load music videos:', error);
                container.innerHTML = '<div class="empty-state"><h3>Error loading music</h3><p>Please check your connection.</p></div>';
            }
        }

        function renderMusic() {
            const container = document.getElementById('music-container');

            if (musicVideos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="music"></i>
                        <h3>No Music Found</h3>
                        <p>Check back later for new music releases</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = musicVideos.map((video, index) => {
                const thumb = getSafePhotoUrl(video.thumbnailUrl || video.thumbnail);
                return `
                <div class="music-card" onclick="window.location.href='watch.html?v=${video._id}'" style="cursor:pointer;">
                    <div class="album-art">
                        <img src="${thumb}"
                             alt="${video.title}"
                             onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect fill=%22%23222%22 width=%22320%22 height=%22180%22/%3E%3C/svg%3E';">
                        <div class="play-overlay">
                            <div class="play-icon">
                                <i data-lucide="play"></i>
                            </div>
                        </div>
                    </div>
                    <div class="music-info">
                        <div class="song-title">${video.title}</div>
                        <div class="artist-name">${video.user?.name || video.channel || 'Bhuban Artist'}</div>
                        <div class="song-meta">
                            <span>${formatCount(video.views || 0)} plays</span>
                            <span>${video.duration || '0:00'}</span>
                        </div>
                        <div class="music-actions">
                            <button class="action-btn add-btn" onclick="event.stopPropagation(); addToPlaylist('${video._id}')">
                                <i data-lucide="plus"></i> Add
                            </button>
                            <button class="action-btn" onclick="event.stopPropagation(); shareSong('${video._id}')">
                                <i data-lucide="share"></i> Share
                            </button>
                        </div>
                    </div>
                </div>
                            `;
            }).join('');

            lucide.createIcons();
        }

        function formatCount(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function filterMusic(genre) {
            currentFilter = genre;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.filter-btn').classList.add('active');
            loadMusic();
        }

        function selectGenre(genre) {
            document.querySelectorAll('.genre-card').forEach(card => card.classList.remove('active'));
            event.target.closest('.genre-card').classList.add('active');
            loadMusic();
        }

        function addToPlaylist(songId) {
            if (song) {
                // In a real app, this would show playlist selection
                alert(`Add "${song.title}" to playlist`);
            }
        }

        function shareSong(songId) {
            const song = musicData.find(s => s.id === songId);
            if (song) {
                if (navigator.share) {
                    navigator.share({
                        title: song.title,
                        text: `Check out this song: ${song.title} by ${song.artist}`,
                        url: window.location.href
// DEBUG: }).catch(err => console.log('Error sharing:', err));
                } else {
                    // Fallback: copy to clipboard
                    navigator.clipboard.writeText(window.location.href + '?song=' + songId);
                    alert('Link copied to clipboard!');
                }
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            renderMusic();

            // Add keyboard navigation for music player
            document.addEventListener('keydown', (e) => {
                // Only handle keys when player is open
                if (document.querySelector('.video-player-overlay')) {
                    switch (e.key) {
                        case ' ':
                            e.preventDefault();
                            togglePlay();
                            break;
                        case 'ArrowRight':
                            e.preventDefault();
                            playNext();
                            break;
                        case 'ArrowLeft':
                            e.preventDefault();
                            playPrevious();
                            break;
                        case 'Escape':
                            const player = document.querySelector('.video-player-overlay');
                            if (player) {
                                player.remove();
                                isPlaying = false;
                            }
                            break;
                    }
                }
            });
        });
    </script>
</body>

</html>
