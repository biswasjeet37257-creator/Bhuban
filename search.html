<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | Bhuban</title>
    <link rel="icon" type="image/png" href="this-is-a-video-sharing-app-like-a-youtube-and-the-1770747539971.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/shared/config.js"></script>
    <script src="/shared/auth-service.js"></script>
    <script src="/shared/theme-manager.js"></script>
    <script src="auth-check.js"></script>

    <style>
        :root {
            /* Light Theme - Vibrant Sunset */
            --bg-primary: #fff8f0;
            --bg-secondary: rgba(255, 255, 255, 0.9);
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-hover: rgba(255, 107, 107, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 200, 150, 0.4);
            --accent-primary: #ff6b35;
            --accent-secondary: #f7931e;
            --accent-pink: #ff006e;
            --accent-red: #e63946;
            --accent-yellow: #ffd60a;
            --accent-gradient: linear-gradient(135deg, #ff6b35 0%, #ff006e 50%, #ffd60a 100%);
            --text-primary: #2d1b14;
            --text-secondary: #8b6b5d;
            --border-color: rgba(255, 107, 107, 0.25);
            --shadow-color: rgba(255, 107, 107, 0.2);
            --glow-color: rgba(255, 107, 107, 0.35);
        }

        [data-theme="dark"] {
            /* Dark Theme - Neon Sunset */
            --bg-primary: #1a0f0a;
            --bg-secondary: rgba(45, 27, 20, 0.7);
            --bg-card: rgba(45, 27, 20, 0.5);
            --bg-hover: rgba(255, 107, 107, 0.2);
            --glass-bg: rgba(45, 27, 20, 0.6);
            --glass-border: rgba(255, 107, 107, 0.25);
            --text-primary: #fff8f0;
            --text-secondary: #d4a574;
            --border-color: rgba(255, 107, 107, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --glow-color: rgba(255, 0, 110, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* Animated Background - Sunset Gradient */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 10% 90%, rgba(255, 107, 53, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 10%, rgba(255, 0, 110, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 214, 10, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            position: fixed;
            top: 16px;
            left: 24px;
            right: 24px;
            height: 64px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow-color);
            transition: all 0.3s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
            transform: scale(1.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            letter-spacing: -1px;
        }

        .header-center {
            flex: 1;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0 40px;
        }

        .search-container {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .search-container:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.15);
        }

        .search-input {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .search-btn {
            background: var(--bg-hover);
            border: none;
            color: var(--text-secondary);
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 1px solid var(--border-color);
        }

        .search-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .voice-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .voice-btn:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
        }

        .main-content {
            margin-top: 96px;
            padding: 32px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-divider {
            height: 1px;
            background: var(--border-color);
            margin: 32px 0;
        }

        /* Channel Cards */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .channel-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px var(--shadow-color);
        }

        .channel-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 48px var(--glow-color);
            border-color: var(--accent-primary);
        }

        .channel-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--accent-gradient);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            overflow: hidden;
            position: relative;
        }

        .channel-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .channel-avatar .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: white;
            background: var(--accent-gradient);
            border-radius: 50%;
        }

        .channel-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .channel-stats {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .subscribe-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .subscribe-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .video-card {
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 20px;
            overflow: hidden;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px var(--shadow-color);
            backdrop-filter: blur(10px);
        }

        .video-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 48px var(--glow-color);
            border-color: var(--accent-primary);
        }

        .video-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-hover);
            overflow: hidden;
        }

        .video-card[data-is-short="true"] .video-thumbnail {
            aspect-ratio: 9/16 !important;
            max-height: 400px !important;
            background: #000 !important;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .video-card[data-is-short="true"] .video-thumbnail img {
            object-fit: contain !important;
        }

        .video-card:hover .video-thumbnail img {
            transform: scale(1.05);
        }

        .video-duration {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .video-info {
            display: flex;
            gap: 12px;
            padding: 16px;
        }

        .video-avatar {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .video-details h3 {
            font-size: 15px;
            margin-bottom: 6px;
            line-height: 1.3;
            font-weight: 600;
            color: var(--text-primary);
        }

        .video-details p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <button class="header-btn" onclick="window.history.back()" aria-label="Go Back">
                <i class="fas fa-arrow-left" style="font-size:20px;"></i>
            </button>
            <div class="logo" onclick="window.location.href='index.html'">
                <i class="fas fa-play" style="font-size:24px;"></i>
                <span>BHUBAN</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-container">
                <input type="search" class="search-input" id="search-input" placeholder="Search videos, channels, creators..."
                    autocomplete="off" autofocus>
                <button class="search-btn" onclick="performSearch()" aria-label="Search">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <button class="voice-btn" onclick="voiceSearch()" aria-label="Voice Search">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
    </header>

    <div class="main-content" id="content-area">
        <!-- Channels Section -->
        <div id="channels-section" style="display:none;">
            <div class="section-title">
                <i class="fas fa-users"></i>
                Channels
            </div>
            <div class="channels-grid" id="channels-grid"></div>
            <div class="section-divider"></div>
        </div>

        <!-- Videos Section -->
        <div id="videos-section" style="display:none;">
            <div class="section-title">
                <i class="fas fa-video"></i>
                Videos
            </div>
            <div class="video-grid" id="results"></div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" style="text-align: center; padding: 80px 20px; color: var(--text-secondary);">
            <i class="fas fa-search" style="font-size: 64px; margin-bottom: 20px; opacity: 0.3;"></i>
            <h3 style="font-size: 24px; margin-bottom: 12px;">Search Bhuban</h3>
            <p>Find videos, channels, and creators</p>
        </div>
    </div>

    <script>
        let searchResults = [];
        let channelResults = [];

        // Helper to bypass Google photo rate limits
        function getSafePhotoUrl(url) {
            if (!url || url === 'null' || url === 'undefined') return null;
            if (url.includes('googleusercontent.com') || url.includes('lh3.google.com') || url.includes('focus-opensocial')) {
                return `https://images.weserv.nl/?url=${encodeURIComponent(url)}&default=letter&l=9&af`;
            }
            return url;
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) {
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('channels-section').style.display = 'none';
                document.getElementById('videos-section').style.display = 'none';
                return;
            }

            // Hide empty state
            document.getElementById('empty-state').style.display = 'none';

            try {
                const apiBase = typeof BhubanConfig !=== 'undefined' && BhubanConfig.api ? BhubanConfig.api.baseUrl : 'http://localhost:5000';
                
                // Fetch videos and channels in parallel
                const [videosRes, usersRes] = await Promise.all([
                    fetch(`${apiBase}/api/videos`),
                    fetch(`${apiBase}/api/users`)
                ]);

                const videosData = await videosRes.json();
                const usersData = await usersRes.json();

                if (videosData.success) {
                    // Filter videos by query
                    const query_lower = query.toLowerCase();
                    searchResults = videosData.data.filter(v => {
                        const title_match = v.title?.toLowerCase().includes(query_lower);
                        const desc_match = v.description?.toLowerCase().includes(query_lower);
                        const channel_match = v.user?.name?.toLowerCase().includes(query_lower);
                        const email_match = v.user?.email?.toLowerCase().includes(query_lower);
                        const tags_match = v.tags?.some(tag => tag.toLowerCase().includes(query_lower));
                        
                        return title_match || desc_match || channel_match || email_match || tags_match;
                    });
                }

                if (usersData.success) {
                    // Filter channels by query
                    const query_lower = query.toLowerCase();
                    channelResults = usersData.data.filter(u => {
                        const name_match = u.name?.toLowerCase().includes(query_lower);
                        const email_match = u.email?.toLowerCase().includes(query_lower);
                        
                        return name_match || email_match;
                    });
                }

                // Display results
                displayChannels(channelResults);
                displayVideos(searchResults);

            } catch (error) {
                console.error('Search failed:', error);
                document.getElementById('empty-state').innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size: 64px; margin-bottom: 20px; opacity: 0.3; color: var(--accent-red);"></i>
                    <h3 style="font-size: 24px; margin-bottom: 12px;">Search failed</h3>
                    <p>Please try again later</p>
                `;
                document.getElementById('empty-state').style.display = 'block';
            }
        }

        function displayChannels(channels) {
            const channelsSection = document.getElementById('channels-section');
            const channelsGrid = document.getElementById('channels-grid');

            if (channels.length === 0) {
                channelsSection.style.display = 'none';
                return;
            }

            channelsSection.style.display = 'block';
            channelsGrid.innerHTML = channels.map(channel => {
                const avatar = getSafePhotoUrl(channel.profilePicture || channel.picture);
                const initial = channel.name ? channel.name.charAt(0).toUpperCase() : 'U';
                const subscriberCount = channel.subscribers || 0;
                const videoCount = channel.videoCount || 0;

                return `
                    <div class="channel-card" onclick="window.location.href='channel.html?id=${channel._id}'">
                        <div class="channel-avatar">
                            ${avatar 
                                ? `<img src="${avatar}" alt="${channel.name}" onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                   <div class="avatar-fallback" style="display:none;">${initial}</div>` 
                                : `<div class="avatar-fallback" style="display:flex;">${initial}</div>`
                            }
                        </div>
                        <div class="channel-name">${channel.name || 'Unknown Channel'}</div>
                        <div class="channel-stats">
                            ${formatCount(subscriberCount)} subscribers • ${formatCount(videoCount)} videos
                        </div>
                        <button class="subscribe-btn" onclick="event.stopPropagation(); subscribeToChannel('${channel._id}')">
                            Subscribe
                        </button>
                    </div>
                `;
            }).join('');
        }

        function displayVideos(videos) {
            const videosSection = document.getElementById('videos-section');
            const resultsContainer = document.getElementById('results');

            if (videos.length === 0) {
                videosSection.style.display = 'none';
                if (channelResults.length === 0) {
                    document.getElementById('empty-state').innerHTML = `
                        <i class="fas fa-search-minus" style="font-size: 64px; margin-bottom: 20px; opacity: 0.3;"></i>
                        <h3 style="font-size: 24px; margin-bottom: 12px;">No results found</h3>
                        <p>Try different keywords or check your spelling</p>
                    `;
                    document.getElementById('empty-state').style.display = 'block';
                }
                return;
            }

            videosSection.style.display = 'block';
            resultsContainer.innerHTML = videos.map(video => {
                const thumb = getSafePhotoUrl(video.thumbnailUrl || video.thumbnail);
                const isShort = video.isShort === true || video.aspectRatio === '9:16' || video.aspectRatio === '1:1';
                const avatar = getSafePhotoUrl(video.user?.profilePicture || video.user?.picture);
                const initial = video.user?.name ? video.user.name.charAt(0).toUpperCase() : 'U';

                return `
                    <div class="video-card" data-is-short="${isShort}" onclick="window.location.href='${isShort ? 'shorts.html' : 'watch.html'}?v=${video._id}'">
                        <div class="video-thumbnail">
                            <img src="${thumb}" 
                                 alt="${video.title}"
                                 onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22%3E%3Crect fill=%22%23222%22 width=%22320%22 height=%22180%22/%3E%3C/svg%3E';">
                            <div class="video-duration">${formatDuration(video.duration) || '0:00'}</div>
                        </div>
                        <div class="video-info">
                            <div class="video-avatar">
                                ${avatar ? `<img src="${avatar}" alt="${video.user?.name}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;" onerror="this.style.display='none'; this.parentElement.textContent='${initial}';">` : initial}
                            </div>
                            <div class="video-details">
                                <h3>${isShort ? '⚡ ' : ''}${video.title}</h3>
                                <p>${video.user?.name || 'Unknown'}</p>
                                <p>${formatCount(video.views || 0)} views • ${getTimeAgo(video.createdAt)}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function subscribeToChannel(channelId) {
            alert('Subscribe feature coming soon!');
        }

        function formatCount(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        function voiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert('Voice search not supported in your browser');
                return;
            }
            const recognition = new SpeechRecognition();
            recognition.onresult = (event) => {
                document.getElementById('search-input').value = event.results[0][0].transcript;
                performSearch();
            };
            recognition.start();
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // URL query param handling
        const urlParams = new URLSearchParams(window.location.search);
        const q = urlParams.get('q');
        if (q) {
            document.getElementById('search-input').value = q;
            performSearch();
        }
    </script>
</body>

</html>
