<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree AI - Location Enabled | Bhuban</title>
    <link rel="icon" type="image/png" href="this-is-a-video-sharing-app-like-a-youtube-and-the-1770747539971.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --accent: #ff3b30;
            --ai-accent: #00d4ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, system-ui, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            background: linear-gradient(135deg, #1a1a1e, #0a0a0e);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .header i {
            cursor: pointer;
        }

        .ai-orb {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ai-accent), #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 212, 255, 0.8); }
        }

        .location-badge {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .location-badge:hover {
            transform: scale(1.05);
        }

        .weather-widget {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 250px;
            display: none;
            z-index: 1000;
        }

        .weather-widget.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ai-accent), #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--accent);
        }

        .message-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent), #ff6b30);
            border: none;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 20px;
            scrollbar-width: none;
        }

        .suggestion-chip {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .suggestion-chip:hover {
            border-color: var(--ai-accent);
            background: rgba(0, 212, 255, 0.1);
        }

        .input-container {
            padding: 15px 20px;
            background: #0a0a0e;
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 12px 20px;
            color: #fff;
            outline: none;
            font-size: 15px;
        }

        .btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--ai-accent), #0099ff);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="header">
        <i data-lucide="arrow-left" onclick="window.history.back()"></i>
        <div class="ai-orb">
            <i data-lucide="sparkles" style="width:30px; height:30px; color:#fff;"></i>
        </div>
        <div>
            <h2 style="font-size:20px; font-weight:900;">🤖 Shree AI</h2>
            <p style="font-size:12px; color:#888;" id="status-text">Ready to help</p>
        </div>
        <div class="location-badge" id="location-badge" onclick="toggleWeather()">
            <i data-lucide="map-pin" style="width:14px; height:14px;"></i>
            <span id="location-text">Get Location</span>
        </div>
    </div>

    <div class="weather-widget" id="weather-widget">
        <h3 style="margin-bottom: 10px; display: flex; align-items: center; gap: 8px;">
            <span id="weather-icon">🌤️</span>
            <span id="weather-location">Loading...</span>
        </h3>
        <div id="weather-details" style="font-size: 14px; color: #aaa; line-height: 1.8;"></div>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="message">
            <div class="message-avatar">
                <i data-lucide="sparkles" style="width:20px; height:20px;"></i>
            </div>
            <div class="message-content">
                <strong>Hello! I'm Shree AI 👋</strong><br>
                I can access your location and provide weather updates!<br><br>
                Click the location badge above to enable location access.
            </div>
        </div>
    </div>

    <div class="suggestions">
        <div class="suggestion-chip" onclick="sendMessage('What is the weather here?')">🌤️ Local Weather</div>
        <div class="suggestion-chip" onclick="sendMessage('What can you do?')">💬 Features</div>
        <div class="suggestion-chip" onclick="sendMessage('Upload a video')">📹 Upload Guide</div>
        <div class="suggestion-chip" onclick="sendMessage('Tell me a joke')">😄 Tell a Joke</div>
    </div>

    <div class="input-container">
        <button class="btn" onclick="toggleVoice()">
            <i data-lucide="mic" style="width:20px; height:20px; color:#fff;"></i>
        </button>
        <input type="text" class="input-box" id="user-input" placeholder="Type or speak to Shree..." autocomplete="off"
            onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn" onclick="sendMessage()">
            <i data-lucide="send" style="width:20px; height:20px; color:#fff;"></i>
        </button>
    </div>

    <script>
        lucide.createIcons();

        let userLocation = null;
        let userWeather = null;
        let recognition;
        let synthesis = window.speechSynthesis;

        // Initialize Speech Recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('user-input').value = transcript;
                sendMessage(transcript);
            };
        }

        function toggleVoice() {
            if (!recognition) {
                alert('Voice recognition not supported in this browser.');
                return;
            }
            recognition.start();
        }

        function speak(text) {
            if (!synthesis) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            synthesis.speak(utterance);
        }

        // Get user's geolocation
        async function getUserLocation() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser');
                return;
            }

            document.getElementById('location-text').textContent = 'Getting...';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    userLocation = { lat, lon };

                    // Get weather for this location
                    await getWeatherByCoords(lat, lon);
                    
                    document.getElementById('location-text').textContent = '📍 Located';
                    addMessage(`📍 Location access granted! I can now provide local weather and location-based information.`, 'ai');
                },
                (error) => {
                    console.error('Location error:', error);
                    document.getElementById('location-text').textContent = 'Location Error';
                    alert('Unable to access location. Please enable location permissions.');
                }
            );
        }

        // Get weather by coordinates
        async function getWeatherByCoords(lat, lon) {
            try {
                const response = await fetch(`http://localhost:5000/api/ai/weather/${lat},${lon}`);
                const data = await response.json();

                if (data.success) {
                    userWeather = data.data;
                    updateWeatherWidget(data.data);
                }
            } catch (error) {
                console.error('Weather error:', error);
            }
        }

        // Update weather widget
        function updateWeatherWidget(weather) {
            document.getElementById('weather-icon').textContent = weather.icon;
            document.getElementById('weather-location').textContent = weather.location;
            document.getElementById('weather-details').innerHTML = `
                <div><strong>${weather.condition}</strong></div>
                <div>🌡️ ${weather.temperature.celsius}°C (${weather.temperature.fahrenheit}°F)</div>
                <div>🤚 Feels like ${weather.feelsLike.celsius}°C</div>
                <div>💧 Humidity: ${weather.humidity}%</div>
                <div>💨 Wind: ${weather.windSpeed} km/h</div>
            `;
        }

        // Toggle weather widget
        function toggleWeather() {
            const widget = document.getElementById('weather-widget');
            
            if (!userLocation) {
                getUserLocation();
                return;
            }

            widget.classList.toggle('show');
        }

        async function sendMessage(text) {
            const input = document.getElementById('user-input');
            const message = text || input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            const typing = document.createElement('div');
            typing.className = 'message';
            typing.id = 'typing-indicator';
            typing.innerHTML = `
                <div class="message-avatar"><i data-lucide="sparkles" style="width:20px; height:20px;"></i></div>
                <div class="message-content">Thinking...</div>
            `;
            document.getElementById('chat-container').appendChild(typing);
            lucide.createIcons();
            scrollToBottom();

            // Enhance prompt with location context if available
            let enhancedPrompt = message;
            if (userLocation && userWeather) {
                enhancedPrompt = `User's location: ${userWeather.location}
Current weather: ${userWeather.condition}, ${userWeather.temperature.celsius}°C

User asks: ${message}

If the question is about local weather or "here", use the location data above.`;
            }

            try {
                const response = await getAIResponse(enhancedPrompt);
                document.getElementById('typing-indicator').remove();
                addMessage(response.text, 'ai');
                if (response.speak) speak(response.text);
            } catch (err) {
                document.getElementById('typing-indicator').remove();
                addMessage("I'm having trouble connecting. Please try again.", 'ai');
            }
        }

        async function getAIResponse(message) {
            try {
                const res = await fetch('http://localhost:5000/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: message,
                        hasLocation: userLocation !=== null,
                        locationData: userWeather
                    })
                });

                const data = await res.json();
                if (data.success) {
                    return { text: data.data, speak: true };
                } else {
                    throw new Error(data.message || 'API error');
                }
            } catch (err) {
                console.error("AI Error:", err.message);
                
                // If it's a network error, provide helpful message
                if (err.message.includes('fetch')) {
                    return {
                        text: "I'm having trouble connecting to the server. Please make sure the backend is running on http://localhost:5000",
                        speak: false
                    };
                }
                
                return {
                    text: "I encountered an error processing your request. Please try again.",
                    speak: false
                };
            }
        }

        function addMessage(text, type) {
            const container = document.getElementById('chat-container');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;

            const avatar = type === 'user'
                ? '<div class="message-avatar"><i data-lucide="user" style="width:20px; height:20px;"></i></div>'
                : '<div class="message-avatar"><i data-lucide="sparkles" style="width:20px; height:20px;"></i></div>';

            msg.innerHTML = `
                ${avatar}
                <div class="message-content">${text.replace(/\n/g, '<br>')}</div>
            `;
            container.appendChild(msg);
            lucide.createIcons();
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        // Auto-request location on load
        setTimeout(() => {
            speak("Hello! I'm Shree. I'd like to access your location for personalized weather updates.");
            // Automatically request location after greeting
            setTimeout(() => {
                getUserLocation();
            }, 2000);
        }, 1000);
    </script>
</body>
</html>
